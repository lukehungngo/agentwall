name: False Positive
description: AgentWall flagged code that is actually safe
title: "[FP] "
labels: ["false-positive", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! False positive reports directly improve AgentWall's accuracy.

  - type: input
    id: rule
    attributes:
      label: Rule ID
      description: "Which rule fired? (e.g., AW-MEM-001)"
      placeholder: "AW-MEM-001"
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Code that was flagged
      description: "Paste the relevant code. Redact secrets."
      render: python
    validations:
      required: true

  - type: textarea
    id: why_safe
    attributes:
      label: Why this is safe
      description: "Explain why this code is not actually vulnerable."
    validations:
      required: true

  - type: textarea
    id: scan_output
    attributes:
      label: AgentWall output
      description: "Paste the relevant finding from `agentwall scan`."
      render: text

  - type: input
    id: version
    attributes:
      label: AgentWall version
      placeholder: "0.1.0"

  - type: input
    id: framework
    attributes:
      label: Framework + version
      placeholder: "langchain 0.3.x"
